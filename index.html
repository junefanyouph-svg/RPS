<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">BET<span>RPS</span></div>
  <div class="header-center">
    <div class="balance">💰 $<span id="balanceDisplay">100.00</span></div>
    <button class="wallet-btn">🎮 Wallet</button>
  </div>
  <div style="font-size:13px;color:var(--text-dim);">Demo Mode</div>
</header>

<div class="app-body">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="tab-row">
      <button class="tab-btn active">Manual</button>
      <button class="tab-btn">Auto</button>
    </div>

    <div id="preGamePanel">
      <div class="label">Bet Amount</div>
      <div class="bet-input-row">
        <div class="bet-input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="betInput" value="1.00" step="0.50" min="0.50">
        </div>
        <button class="half-btn" onclick="halveBet()">½</button>
        <button class="double-btn" onclick="doubleBet()">2×</button>
      </div>
      <br>
      <button class="btn-primary" onclick="placeBet()">Place Bet</button>
      <br><br>
      <div class="info-text">Balance: $<span id="sidebarBalance">100.00</span></div>
    </div>

    <div id="inGamePanel" style="display:none;">
      <div class="payout-box">
        <div class="payout-row">
          <span class="payout-label">Payout</span>
          <span class="payout-multiplier" id="currentMultDisplay">1×</span>
        </div>
        <div class="payout-amount" id="currentPayoutDisplay">$0.00</div>
      </div>
      <div id="resultBanner" class="result-banner"></div>
      <button class="btn-secondary" onclick="randomBet()">🎲 Random</button>
      <button class="btn-cashout"   onclick="cashOut()">💰 Cash Out</button>
      <div class="info-text">Bet: $<span id="betAmountDisplay">0.00</span></div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div class="game-area">
    <div class="game-header">
      <div class="game-title">
        <div class="game-title-dot"></div>
        Rock Paper Scissors
      </div>
      <div class="fairplay">Fair Play</div>
    </div>

    <!-- Horizontal bracket -->
    <div class="bracket-container" id="bracketContainer">
      <div class="bracket-track" id="bracketTrack"></div>
    </div>

    <!-- Pick buttons -->
    <div class="choice-row">
      <button class="choice-btn" id="btnRock"     onclick="playerChoose('rock')"     title="Rock">✊</button>
      <button class="choice-btn" id="btnPaper"    onclick="playerChoose('paper')"    title="Paper">🖐</button>
      <button class="choice-btn" id="btnScissors" onclick="playerChoose('scissors')" title="Scissors">✌️</button>
    </div>
  </div>

</div>

<!-- GAME OVER OVERLAY -->
<div class="gameover-overlay" id="gameoverOverlay">
  <div class="gameover-box" id="gameoverBox">
    <div class="gameover-icon"   id="gameoverIcon"></div>
    <div class="gameover-title"  id="gameoverTitle"></div>
    <div class="gameover-amount" id="gameoverAmount"></div>
    <button class="gameover-btn" onclick="closeGameOver()">Play Again</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
